services:
  - type: web
    name: SmartHeartDiagnosis-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

  - type: web
    name: SmartHeartDiagnosis-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://cardioai-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
